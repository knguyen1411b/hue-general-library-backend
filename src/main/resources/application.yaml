application:
  admin:
    username: ${SUPER_USER_USERNAME}
    password: ${SUPER_USER_PASSWORD}
    fullName: ${SUPER_USER_FULL_NAME}
    email: ${SUPER_USER_EMAIL}
  security:
    jwt:
      secretKey: ${JWT_SECRET}
      accessTokenExpiration: ${JWT_ACCESS_EXPIRATION}
      refreshTokenExpiration: ${JWT_REFRESH_EXPIRATION}

cloudinary:
  cloudName: ${CLOUDINARY_CLOUD_NAME}
  apiKey: ${CLOUDINARY_API_KEY}
  apiSecret: ${CLOUDINARY_API_SECRET}
  folder: ${CLOUDINARY_FOLDER}

spring:
  application:
    name: ${APPLICATION_NAME}
    version: ${APPLICATION_VERSION}

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  task:
    execution:
      pool:
        core-size: ${THREAD_POOL_CORE_SIZE}
        max-size: ${THREAD_POOL_MAX_SIZE}
        queue-capacity: ${THREAD_POOL_QUEUE_CAPACITY}

springdoc:
  swagger-ui:
    default-model-expand-depth: 0
    defaultModelsExpandDepth: 0
    tags-sorter: alpha

server:
  port: ${PORT}
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS}
      max-queue-capacity: ${TOMCAT_MAX_QUEUE_CAPACITY}
