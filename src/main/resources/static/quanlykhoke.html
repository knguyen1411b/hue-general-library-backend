<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Kho Kệ - Thư viện</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .modal { display: none; }
        .modal.active { display: flex; }
        /* Tùy chỉnh thanh cuộn cho mát mắt */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Sơ đồ Kho Kệ</h1>
                <p class="text-slate-500 text-sm">Hệ thống phân cấp: Tầng > Dãy > Kệ > Ngăn</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="openFormModal('floor')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all shadow-sm">
                    + Thêm Tầng
                </button>
                <button onclick="openFormModal('aisle')" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all shadow-sm">
                    + Thêm Dãy
                </button>
                <button onclick="openFormModal('shelf')" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all shadow-sm">
                    + Thêm Kệ
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[600px]">
                <div class="p-4 border-b border-slate-100 font-semibold text-slate-700 bg-slate-50/50">Cấu trúc sơ đồ</div>
                <div id="tree-container" class="p-4 overflow-y-auto flex-1 space-y-2">
                    </div>
            </div>

            <div class="lg:col-span-8 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-[600px]">
                <div id="shelf-header" class="p-6 border-b border-slate-100 flex justify-between items-center">
                    <p class="text-slate-400 italic">Chọn một kệ để xem chi tiết...</p>
                </div>
                <div id="grid-container" class="p-6 overflow-auto flex-1 bg-slate-50/30 flex items-center justify-center">
                    <div class="text-slate-300 text-center">
                        <i class="fa-solid fa-table-cells text-5xl mb-2"></i>
                        <p>Chưa có dữ liệu</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-form" class="modal fixed inset-0 z-50 items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                <h3 id="modal-title" class="text-lg font-bold text-slate-800">Thêm mới</h3>
                <button onclick="closeModal('modal-form')" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Tên định danh</label>
                    <input type="text" id="input-name" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Nhập tên..." onkeypress="handleKeyPress(event)">
                </div>

                <div id="shelf-select-inputs" class="hidden space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Chọn Tầng</label>
                        <select id="select-floor" class="w-full px-4 py-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500" onchange="updateAisleSelect()">
                            <option value="">-- Chọn Tầng --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Chọn Dãy</label>
                        <select id="select-aisle" class="w-full px-4 py-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="">-- Chọn Dãy --</option>
                        </select>
                    </div>
                </div>

                <div id="aisle-select-inputs" class="hidden space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Chọn Tầng</label>
                        <select id="select-floor-aisle" class="w-full px-4 py-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="">-- Chọn Tầng --</option>
                        </select>
                    </div>
                </div>

                <div id="shelf-dims-inputs" class="hidden grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Số Hàng</label>
                        <input type="number" id="input-rows" value="4" class="w-full px-4 py-2 border border-slate-200 rounded-lg outline-none" onkeypress="handleKeyPress(event)">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Số Cột</label>
                        <input type="number" id="input-cols" value="5" class="w-full px-4 py-2 border border-slate-200 rounded-lg outline-none" onkeypress="handleKeyPress(event)">
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="closeModal('modal-form')" class="flex-1 py-2 border border-slate-200 text-slate-600 rounded-lg font-medium">Hủy</button>
                    <button onclick="handleSubmit()" class="flex-1 py-2 bg-slate-800 text-white rounded-lg font-medium">Xác nhận</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-pos" class="modal fixed inset-0 z-50 items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
            <div id="pos-header" class="p-5 text-white bg-indigo-600">
                <h3 class="text-xl font-bold" id="pos-title">Ngăn 1-1</h3>
            </div>
            <div class="p-6 space-y-4">
                <div class="flex justify-between text-sm py-2 border-b border-slate-100">
                    <span class="text-slate-500">Sách hiện có:</span>
                    <span class="font-bold text-indigo-600" id="book-count">0 cuốn</span>
                </div>
                <div id="book-list" class="max-h-48 overflow-y-auto bg-slate-50 rounded-lg p-3 space-y-2">
                    <!-- Danh sách sách sẽ hiển thị ở đây -->
                </div>
                <div class="flex gap-2 pt-3">
                    <button onclick="editPosition()" class="flex-1 py-2 bg-slate-50 text-amber-600 rounded-lg text-sm font-medium border border-slate-200 hover:bg-amber-50">Chỉnh sửa</button>
                    <button onclick="deletePosition()" class="flex-1 py-2 bg-red-50 text-red-600 rounded-lg text-sm font-bold hover:bg-red-100">Xóa</button>
                </div>
                <button onclick="closeModal('modal-pos')" class="w-full py-2 text-slate-500 hover:bg-slate-50 rounded-lg text-xs">Đóng</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Dữ liệu mẫu (Mock Data)
        let data = [
            { id: 1, name: 'Tầng 1', aisles: [
                { id: 11, name: 'Dãy A', shelves: [
                    { 
                        id: 111, name: 'Kệ A-01', rows: 4, cols: 6,
                        positions: {
                            '1-1': [
                                { id: 1, title: 'Lập trình C++', author: 'Bjarne Stroustrup', year: 2021 },
                                { id: 2, title: 'Clean Code', author: 'Robert C. Martin', year: 2020 }
                            ],
                            '1-2': [
                                { id: 3, title: 'Thiết kế mẫu', author: 'Gang of Four', year: 2019 }
                            ],
                            '2-3': [
                                { id: 4, title: 'Database Design', author: 'C.J. Date', year: 2022 },
                                { id: 5, title: 'SQL Advanced', author: 'Joe Celko', year: 2021 }
                            ]
                        }
                    },
                    { 
                        id: 112, name: 'Kệ A-02', rows: 3, cols: 4,
                        positions: {
                            '1-1': [
                                { id: 6, title: 'Web Development', author: 'Kyle Simpson', year: 2023 }
                            ]
                        }
                    }
                ]},
                { id: 12, name: 'Dãy B', shelves: [] }
            ]},
            { id: 2, name: 'Tầng 2', aisles: [] }
        ];

        // Biến lưu shelf hiện tại đang xem
        let selectedShelf = null;
        let currentType = '';
        let editingId = null; // Lưu ID của item đang sửa
        let editingParentId = null; // Lưu parent ID khi sửa (cho aisle/shelf)

        // 2. Hàm Khởi tạo & Render cây thư mục
        function renderTree() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';

            data.forEach(floor => {
                const floorEl = document.createElement('div');
                floorEl.innerHTML = `
                    <div class="flex items-center justify-between p-2 hover:bg-indigo-50 rounded-lg cursor-pointer group text-slate-700" onclick="toggleSub('floor-${floor.id}')">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-building text-indigo-500"></i>
                            <span class="font-semibold">${floor.name}</span>
                        </div>
                        <div class="hidden group-hover:flex gap-2">
                            <button onclick="event.stopPropagation(); openEditModal('floor', ${floor.id})" class="p-1 hover:text-blue-600"><i class="fa-solid fa-pen text-xs"></i></button>
                            <button onclick="event.stopPropagation(); deleteItem('floor', ${floor.id})" class="p-1 hover:text-red-600"><i class="fa-solid fa-trash text-xs"></i></button>
                        </div>
                    </div>
                    <div id="floor-${floor.id}" class="hidden ml-6 border-l-2 border-slate-100 pl-2 space-y-1">
                        ${floor.aisles.map(aisle => `
                            <div class="p-1">
                                <div class="flex items-center justify-between hover:text-emerald-600 cursor-pointer group text-sm" onclick="toggleSub('aisle-${aisle.id}')">
                                    <div class="flex items-center gap-2">
                                        <i class="fa-solid fa-road opacity-50"></i>
                                        <span>${aisle.name}</span>
                                    </div>
                                    <div class="hidden group-hover:flex gap-1">
                                        <button onclick="event.stopPropagation(); openEditModal('aisle', ${aisle.id}, ${floor.id})" class="p-1 hover:text-blue-600"><i class="fa-solid fa-pen text-[10px]"></i></button>
                                        <button onclick="event.stopPropagation(); deleteItem('aisle', ${aisle.id})" class="p-1 hover:text-red-600"><i class="fa-solid fa-trash text-[10px]"></i></button>
                                    </div>
                                </div>
                                <div id="aisle-${aisle.id}" class="hidden ml-4 mt-1 space-y-1">
                                    ${aisle.shelves.map(shelf => `
                                        <div class="text-xs p-1.5 hover:bg-amber-50 rounded cursor-pointer text-slate-500 hover:text-amber-700 flex justify-between items-center group" onclick="viewShelf(${floor.id}, ${aisle.id}, ${shelf.id})">
                                            <div><i class="fa-solid fa-table-cells mr-2"></i> ${shelf.name}</div>
                                            <div class="hidden group-hover:flex gap-1">
                                                <button onclick="event.stopPropagation(); openEditModal('shelf', ${shelf.id}, ${aisle.id})" class="p-1 hover:text-blue-600"><i class="fa-solid fa-pen text-[8px]"></i></button>
                                                <button onclick="event.stopPropagation(); deleteItem('shelf', ${shelf.id})" class="p-1 hover:text-red-600"><i class="fa-solid fa-trash text-[8px]"></i></button>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(floorEl);
            });
        }

        // 3. Logic đóng mở các cấp
        function toggleSub(id) {
            const el = document.getElementById(id);
            if(el) el.classList.toggle('hidden');
            event.stopPropagation();
        }

        // 4. Logic hiển thị Lưới ngăn (Grid)
        function viewShelf(floorId, aisleId, shelfId) {
            const floor = data.find(f => f.id === floorId);
            const aisle = floor.aisles.find(a => a.id === aisleId);
            const shelf = aisle.shelves.find(s => s.id === shelfId);

            selectedShelf = shelf; // Lưu shelf hiện tại

            // Update Header
            document.getElementById('shelf-header').innerHTML = `
                <div>
                    <h2 class="text-lg font-bold text-slate-800">${shelf.name}</h2>
                    <p class="text-xs text-slate-500">Vị trí: ${floor.name} > ${aisle.name}</p>
                </div>
                <div class="flex gap-2">
                    <span class="px-2 py-1 bg-slate-100 text-slate-600 rounded text-[10px] font-bold">${shelf.rows}x${shelf.cols}</span>
                </div>
            `;

            // Update Grid
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            grid.className = "p-6 overflow-auto flex-1 bg-slate-50/30 grid gap-3 align-content-start";
            grid.style.gridTemplateColumns = `repeat(${shelf.cols}, minmax(80px, 1fr))`;

            for (let r = 1; r <= shelf.rows; r++) {
                for (let c = 1; c <= shelf.cols; c++) {
                    const books = shelf.positions?.[`${r}-${c}`] || [];
                    const cell = document.createElement('div');
                    cell.className = "aspect-square bg-white border-2 border-slate-200 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:border-indigo-400 hover:shadow-md transition-all relative group";
                    cell.innerHTML = `
                        <span class="text-[10px] text-slate-400 font-mono mb-1">${r}-${c}</span>
                        <i class="fa-solid fa-book text-slate-200 group-hover:text-indigo-300"></i>
                        ${books.length > 0 ? `<span class="absolute top-1 right-1 bg-emerald-500 text-white text-[8px] px-1.5 py-0.5 rounded-full font-bold">${books.length}</span>` : ''}
                    `;
                    cell.onclick = () => openPosModal(r, c);
                    grid.appendChild(cell);
                }
            }
        }

        // 5. Quản lý Modal (JS Thuần)
        function openFormModal(type) {
            editingId = null;
            editingParentId = null;
            openFormModalInternal(type);
        }

        function openEditModal(type, id, parentId = null) {
            editingId = id;
            editingParentId = parentId;
            openFormModalInternal(type);
        }

        function openFormModalInternal(type) {
            const modal = document.getElementById('modal-form');
            const title = document.getElementById('modal-title');
            const shelfSelectInputs = document.getElementById('shelf-select-inputs');
            const aisleSelectInputs = document.getElementById('aisle-select-inputs');
            const shelfDimsInputs = document.getElementById('shelf-dims-inputs');
            
            const isEdit = editingId !== null;
            
            if (isEdit) {
                title.innerText = type === 'floor' ? 'Sửa Tầng' : (type === 'aisle' ? 'Sửa Dãy' : 'Sửa Kệ');
            } else {
                title.innerText = type === 'floor' ? 'Thêm Tầng' : (type === 'aisle' ? 'Thêm Dãy' : 'Thêm Kệ');
            }
            
            currentType = type;
            // Clear inputs
            document.getElementById('input-name').value = '';
            document.getElementById('input-rows').value = '4';
            document.getElementById('input-cols').value = '5';
            document.getElementById('input-rows').readOnly = false;
            document.getElementById('input-rows').classList.remove('bg-slate-100', 'cursor-not-allowed');
            document.getElementById('input-cols').readOnly = false;
            document.getElementById('input-cols').classList.remove('bg-slate-100', 'cursor-not-allowed');

            // Populate existing data if editing
            if (isEdit) {
                if (type === 'floor') {
                    const floor = data.find(f => f.id === editingId);
                    document.getElementById('input-name').value = floor.name;
                } else if (type === 'aisle') {
                    const floor = data.find(f => f.aisles.some(a => a.id === editingId));
                    const aisle = floor.aisles.find(a => a.id === editingId);
                    document.getElementById('input-name').value = aisle.name;
                } else if (type === 'shelf') {
                    const floor = data.find(f => f.aisles.some(a => a.shelves.some(s => s.id === editingId)));
                    const aisle = floor.aisles.find(a => a.shelves.some(s => s.id === editingId));
                    const shelf = aisle.shelves.find(s => s.id === editingId);
                    document.getElementById('input-name').value = shelf.name;
                    document.getElementById('input-rows').value = shelf.rows;
                    document.getElementById('input-cols').value = shelf.cols;
                    document.getElementById('input-rows').readOnly = true;
                    document.getElementById('input-rows').classList.add('bg-slate-100', 'cursor-not-allowed');
                    document.getElementById('input-cols').readOnly = true;
                    document.getElementById('input-cols').classList.add('bg-slate-100', 'cursor-not-allowed');
                }
            }

            // Hide/show select inputs
            if(type === 'shelf') {
                shelfSelectInputs.classList.remove('hidden');
                shelfDimsInputs.classList.remove('hidden');
                aisleSelectInputs.classList.add('hidden');
                
                // Populate floor select
                const floorSelect = document.getElementById('select-floor');
                floorSelect.innerHTML = '<option value="">-- Chọn Tầng --</option>';
                data.forEach(floor => {
                    const option = document.createElement('option');
                    option.value = floor.id;
                    option.textContent = floor.name;
                    floorSelect.appendChild(option);
                    
                    // Nếu edit thì select tầng của shelf đó
                    if (isEdit && editingParentId) {
                        const aisle = data.find(f => f.aisles.some(a => a.id === editingParentId))?.aisles.find(a => a.id === editingParentId);
                        if (aisle && data.find(f => f.aisles.includes(aisle))) {
                            floorSelect.value = data.find(f => f.aisles.includes(aisle)).id;
                        }
                    }
                });
                
                // Clear aisle select
                document.getElementById('select-aisle').innerHTML = '<option value="">-- Chọn Dãy --</option>';
                
                // Nếu edit thì load các dãy của tầng
                if (isEdit && editingParentId) {
                    updateAisleSelect();
                    document.getElementById('select-aisle').value = editingParentId;
                }
            } 
            else if(type === 'aisle') {
                aisleSelectInputs.classList.remove('hidden');
                shelfSelectInputs.classList.add('hidden');
                shelfDimsInputs.classList.add('hidden');
                
                // Populate floor select
                const floorSelect = document.getElementById('select-floor-aisle');
                floorSelect.innerHTML = '<option value="">-- Chọn Tầng --</option>';
                data.forEach(floor => {
                    const option = document.createElement('option');
                    option.value = floor.id;
                    option.textContent = floor.name;
                    floorSelect.appendChild(option);
                    
                    // Nếu edit thì select tầng của aisle đó
                    if (isEdit && editingParentId) {
                        if (floor.aisles.some(a => a.id === editingId)) {
                            floorSelect.value = floor.id;
                        }
                    }
                });
            }
            else {
                shelfSelectInputs.classList.add('hidden');
                aisleSelectInputs.classList.add('hidden');
                shelfDimsInputs.classList.add('hidden');
            }

            modal.classList.add('active');
        }

        function updateAisleSelect() {
            const floorId = parseInt(document.getElementById('select-floor').value);
            const aisleSelect = document.getElementById('select-aisle');
            
            aisleSelect.innerHTML = '<option value="">-- Chọn Dãy --</option>';
            
            if (!floorId) return;
            
            const floor = data.find(f => f.id === floorId);
            if (floor && floor.aisles.length > 0) {
                floor.aisles.forEach(aisle => {
                    const option = document.createElement('option');
                    option.value = aisle.id;
                    option.textContent = aisle.name;
                    aisleSelect.appendChild(option);
                });
            } else {
                aisleSelect.innerHTML = '<option value="">-- Tầng này chưa có Dãy --</option>';
            }
        }

        let currentPos = { r: 0, c: 0 };

        function openPosModal(r, c) {
            currentPos = { r, c };
            const posKey = `${r}-${c}`;
            const books = selectedShelf.positions?.[posKey] || [];
            
            document.getElementById('pos-title').innerText = `Ngăn ${r}-${c}`;
            document.getElementById('book-count').innerText = `${books.length} cuốn`;
            
            // Render danh sách sách
            const bookList = document.getElementById('book-list');
            if (books.length === 0) {
                bookList.innerHTML = '<p class="text-slate-400 text-xs text-center py-4">Chưa có sách</p>';
            } else {
                bookList.innerHTML = books.map(book => `
                    <div class="bg-white p-2 rounded border-l-2 border-indigo-400 text-xs">
                        <p class="font-semibold text-slate-800">${book.title}</p>
                        <p class="text-slate-500">${book.author} (${book.year})</p>
                    </div>
                `).join('');
            }
            
            document.getElementById('modal-pos').classList.add('active');
        }

        function editPosition() {
            alert(`Chỉnh sửa ngăn ${currentPos.r}-${currentPos.c}`);
            // TODO: Mở form edit
        }

        function deletePosition() {
            if (confirm(`Bạn có chắc muốn xóa ngăn ${currentPos.r}-${currentPos.c}?`)) {
                alert('Đã xóa ngăn');
                closeModal('modal-pos');
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // Đóng modal khi click ra ngoài
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }

        function handleSubmit() {
            const name = document.getElementById('input-name').value.trim();
            if (!name) {
                alert('Vui lòng nhập tên');
                return;
            }

            const isEdit = editingId !== null;

            if (currentType === 'floor') {
                if (isEdit) {
                    const floor = data.find(f => f.id === editingId);
                    floor.name = name;
                    alert(`✅ Đã sửa Tầng: ${name}`);
                } else {
                    const newId = Math.max(...data.map(f => f.id), 0) + 1;
                    data.push({
                        id: newId,
                        name: name,
                        aisles: []
                    });
                    alert(`✅ Đã thêm Tầng: ${name}`);
                }
            } 
            else if (currentType === 'aisle') {
                if (isEdit) {
                    const floor = data.find(f => f.aisles.some(a => a.id === editingId));
                    const aisle = floor.aisles.find(a => a.id === editingId);
                    aisle.name = name;
                    alert(`✅ Đã sửa Dãy: ${name}`);
                } else {
                    const floorId = parseInt(document.getElementById('select-floor-aisle').value);
                    if (!floorId) {
                        alert('Vui lòng chọn Tầng');
                        return;
                    }
                    const floor = data.find(f => f.id === floorId);
                    const newId = Math.max(...floor.aisles.map(a => a.id), 0) + 1;
                    floor.aisles.push({
                        id: newId,
                        name: name,
                        shelves: []
                    });
                    alert(`✅ Đã thêm Dãy: ${name} vào ${floor.name}`);
                }
            }
            else if (currentType === 'shelf') {
                const rows = parseInt(document.getElementById('input-rows').value);
                const cols = parseInt(document.getElementById('input-cols').value);
                
                if (rows <= 0 || cols <= 0) {
                    alert('Số Hàng và Số Cột phải lớn hơn 0');
                    return;
                }

                if (isEdit) {
                    const floor = data.find(f => f.aisles.some(a => a.shelves.some(s => s.id === editingId)));
                    const aisle = floor.aisles.find(a => a.shelves.some(s => s.id === editingId));
                    const shelf = aisle.shelves.find(s => s.id === editingId);
                    shelf.name = name;
                    // Không sửa rows/cols
                    alert(`✅ Đã sửa Kệ: ${name}`);
                } else {
                    const floorId = parseInt(document.getElementById('select-floor').value);
                    const aisleId = parseInt(document.getElementById('select-aisle').value);

                    if (!floorId) {
                        alert('Vui lòng chọn Tầng');
                        return;
                    }
                    if (!aisleId) {
                        alert('Vui lòng chọn Dãy');
                        return;
                    }

                    const floor = data.find(f => f.id === floorId);
                    const aisle = floor.aisles.find(a => a.id === aisleId);

                    const newId = Math.max(...aisle.shelves.map(s => s.id), 0) + 1;
                    aisle.shelves.push({
                        id: newId,
                        name: name,
                        rows: rows,
                        cols: cols,
                        positions: {}
                    });
                    alert(`✅ Đã thêm Kệ: ${name} (${rows}x${cols}) vào ${floor.name} > ${aisle.name}`);
                }
            }

            renderTree();
            closeModal('modal-form');
        }

        function deleteItem(type, id) {
            if (!confirm(`Bạn có chắc muốn xóa ${type === 'floor' ? 'Tầng' : (type === 'aisle' ? 'Dãy' : 'Kệ')} này?`)) {
                return;
            }

            if (type === 'floor') {
                const idx = data.findIndex(f => f.id === id);
                if (idx > -1) data.splice(idx, 1);
            } else if (type === 'aisle') {
                const floor = data.find(f => f.aisles.some(a => a.id === id));
                if (floor) {
                    const idx = floor.aisles.findIndex(a => a.id === id);
                    if (idx > -1) floor.aisles.splice(idx, 1);
                }
            } else if (type === 'shelf') {
                const floor = data.find(f => f.aisles.some(a => a.shelves.some(s => s.id === id)));
                if (floor) {
                    const aisle = floor.aisles.find(a => a.shelves.some(s => s.id === id));
                    if (aisle) {
                        const idx = aisle.shelves.findIndex(s => s.id === id);
                        if (idx > -1) aisle.shelves.splice(idx, 1);
                    }
                }
            }

            alert(`✅ Đã xóa ${type === 'floor' ? 'Tầng' : (type === 'aisle' ? 'Dãy' : 'Kệ')}`);
            renderTree();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleSubmit();
            }
        }

        // Chạy lần đầu
        renderTree();
    </script>
</body>
</html>
