spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true

  flyway:
    enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: test@gmail.com
    password: testpassword

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 10

application:
  admin:
    username: admin
    password: password
    fullName: Test Admin
    email: admin@test.com
  security:
    jwt:
      secretKey: supersecretkeysupersecretkeysupersecretkeysupersecretkey
      accessTokenExpiration: 3600000
      refreshTokenExpiration: 86400000

cloudinary:
  cloudName: test
  apiKey: test
  apiSecret: test
  folder: test

server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 10
      max-queue-capacity: 100
